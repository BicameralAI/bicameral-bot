name: Bicameral factory attestation

on:
  pull_request:
    branches: [main]

jobs:
  factory-attestation:
    name: bicameral-factory-attestation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate factory attestation
        run: |
          python3 scripts/validate-factory-attestation.py .bicameral/factory-attestations
